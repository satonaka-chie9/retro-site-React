services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_ADMIN_USER
        - VITE_ADMIN_PASS
    ports:
      - "3005:80"
    restart: always
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3001:3001"
    volumes:
      - ./retro.db:/app/retro.db
    restart: always
