# fly.toml app configuration file generated for retro-site-react on 2026-03-23T12:41:47+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'retro-site-react'
primary_region = 'nrt'

[build]
  dockerfile = "Dockerfile.production"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

  [mounts]
    source = "retro_data"
    destination = "/data"
